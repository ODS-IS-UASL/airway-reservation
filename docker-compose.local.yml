version: "3.8"

services:
  uasl_reservation:
    build:
      context: .
      dockerfile: ./containers/uasl_reservation/Dockerfile.local
    command: "air -c /app/containers/uasl_reservation/.air.toml"
    ports:
      - 8080:8080
    volumes:
      - ./:/app
    env_file:
      - .env.local
    depends_on:
      - postgres
    networks:
      - uasl_reservation
    image: uasl_reservation-app
    platform: linux/x86_64
    entrypoint:
      - dockerize
      - -timeout
      - 60s
      - -wait
      - tcp://aw-postgres:5432
  postgres:
    image: postgis/postgis:15-3.4
    hostname: postgres
    container_name: aw-postgres
    ports:
      - 5432:5432
    networks:
      - uasl_reservation
    env_file:
      - internal/pkg/config/${APP_ENV}.yml
    restart: always
networks:
  uasl_reservation:
