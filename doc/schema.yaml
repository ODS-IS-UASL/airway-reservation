openapi: 3.0.3
info:
  title: ドローン航路一括予約API
  version: 1.0.10
  description: |
    # ドローン航路一括予約インターフェース仕様書
    ### 変更履歴

    | 版 | 日付 | 備考 |
    |---------|------------|----------------------------|
    | 1.0.10 | 2026-03-25 | 仮押さえ予約時の離着陸場の日時指定を任意に変更 |
    | 1.0.9 | 2026-03-04 | DestinationReservationEntityのvehicles[]を削除 |
    | 1.0.8 | 2026-03-03 | originReservationにreservationId（主航路の予約ID）を追加 |
    | 1.0.7 | 2026-02-26 | 認証方式にBearerAuth追加、/availabilityレスポンスのresultをフラット化、 |
    | 1.0.6 | 2026-02-20 | レスポンスexampleをper fieldに変更。/availabilityレスポンスにports,vehicles追加 |
    | 1.0.5 | 2026-02-13 | VehicleInput/VehicleElementにaircraftInfo(Object)を追加。AircraftInfoスキーマを新設 |
    | 1.0.4 | 2026-02-13 | 全レスポンスのペイロード構造をoriginReservation/destinationReservationsに再構成。OriginReservationEntity（reservationIdなし）とDestinationReservationEntity（reservationIdあり）を分離。estimatedAt廃止 |
    | 1.0.3 | 2026-01-29 | OpenAPI仕様の表現整理  |
    | 1.0.2 | 2026-01-28 | OpenAPI仕様の表現整理および例の修正 |
    | 1.0.1 | 2026-01-26 | 予約レスポンスの uaslSections に子予約ID(reservationId)、航路ID(uaslId)、通過順(sequence)を追加 |
    | 1.0.0 | 2025-12-23 | 初回コミット |

  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
security:
  - ApiKeyAuth: []
    BearerAuth: []
servers:
  - url: https://{baseUrl}/v1
    variables:
      baseUrl:
        default: uasl.poc-pf.xxxxx.com
paths:
  /uaslReservations:
    post:
      tags:
        - ドローン航路一括予約サービス
      summary: 航路一括予約を仮押さえする
      operationId: uasl_reservations_post
      description: 航路・機体・離着陸場をまとめて予約する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUaslReservationsRequest"
            examples:
              withOptional:
                summary: with optional fields
                value:
                  operatorId: 60c895e5-321a-fe8a-af39-f005f3206efb
                  ignoreFlightPlanConflict: false
                  vehicles:
                    - vehicleId: ROUTEOPRID-VEHICLEID-101
                      aircraftInfo:
                        aircraftInfoId: 0
                        registrationId: JU1234567890AB
                        maker: DJI
                        modelNumber: M30T
                        name: DJI Matrice 30T
                        type: マルチコプター
                        length: 1.2
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T11:00:00Z
                  ports:
                    - portId: ROUTEOPRID-PORTMFRID-101
                      usageType: 1
                      startAt: 2025-12-12T09:50:00Z
                      endAt: 2025-12-12T10:20:00Z
                    - portId: ROUTEOPRID-PORTMFRID-102
                      usageType: 2
                      startAt: 2025-12-12T10:20:00Z
                      endAt: 2025-12-12T11:00:00Z
                  uaslSections:
                    - uaslSectionId: 5a2f2b6a-410d-4d6e-a0b9-13cc2e0db2a5
                      uaslId: 6b3c4d5e-2222-3333-4444-555566667777
                      sequence: 1
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T11:00:00Z
              minimal:
                summary: minimal
                value:
                  operatorId: 60c895e5-321a-fe8a-af39-f005f3206efb
                  uaslSections:
                    - uaslSectionId: 5a2f2b6a-410d-4d6e-a0b9-13cc2e0db2a5
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T10:10:00Z
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUaslReservationsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - 重複により予約失敗（空域・航路・機体・ポート）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictedResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uaslReservations/availability:
    post:
      tags:
        - ドローン航路一括予約サービス
      summary: 航路区画・機体・離着陸場予約の予約状況を取得する
      operationId: uasl_reservations_availability_post
      description: |
        指定された航路区画・機体・離着陸場予約情報を返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityUaslReservationsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UaslReservationAvailabilityResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uaslReservations/estimate:
    post:
      tags:
        - ドローン航路一括予約サービス
      summary: 航路利用料金の概算見積りを取得する
      operationId: uasl_reservations_estimate_post
      description: 航路・機体・離着陸場の料金概算を算出する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUaslReservationsEstimateRequest"
            examples:
              withOptional:
                summary: with optional fields
                value:
                  uaslSections:
                    - uaslSectionId: 5a2f2b6a-410d-4d6e-a0b9-13cc2e0db2a5
                      uaslId: 6b3c4d5e-2222-3333-4444-555566667777
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T11:00:00Z
                  vehicles:
                    - vehicleId: ROUTEOPRID-VEHICLEID-101
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T11:00:00Z
                  ports:
                    - portId: ROUTEOPRID-PORTMFRID-101
                      startAt: 2025-12-12T09:50:00Z
                      endAt: 2025-12-12T10:20:00Z
                    - portId: ROUTEOPRID-PORTMFRID-102
                      startAt: 2025-12-12T10:20:00Z
                      endAt: 2025-12-12T11:00:00Z
              minimal:
                summary: minimal
                value:
                  uaslSections:
                    - uaslSectionId: 5a2f2b6a-410d-4d6e-a0b9-13cc2e0db2a5
                      startAt: 2025-12-12T10:00:00Z
                      endAt: 2025-12-12T10:10:00Z
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUaslReservationsEstimateResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/uaslReservations:
    get:
      tags:
        - ドローン航路一括予約サービス
      summary: 管理者として航路一括予約一覧を取得する
      operationId: uasl_reservations_admin_get
      description: 管理者向け一覧取得（ページング対応）。
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: ページ番号
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUaslReservationResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /operator/{operatorId}/uaslReservations:
    get:
      tags:
        - ドローン航路一括予約サービス
      summary: 運航事業者IDで航路一括予約一覧を取得
      operationId: uasl_reservations_operator_get
      description: 運航事業者IDでフィルタした一覧取得（ページング対応）
      parameters:
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
          description: 運航事業者ID
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: ページ番号
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUaslReservationResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uaslReservations/{requestId}:
    get:
      tags:
        - ドローン航路一括予約サービス
      summary: 航路一括予約の詳細を取得する
      operationId: uasl_reservations_detail_get
      description: |
        航路 + 機体 + 離着陸場 予約詳細情報取得。
        空域干渉情報を含む。
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
          description: |
            親予約ID（冪等キー）。
            POST /uaslReservations のレスポンスで返却される requestId を指定する。
            同一requestIdで複数回呼び出しても同じ結果を返す。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UaslReservationDetailResponse"
        "403":
          description: Forbidden - 予約が見つからない、またはアクセス権限がない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uaslReservations/{requestId}/confirm:
    put:
      tags:
        - ドローン航路一括予約サービス
      operationId: uasl_reservations_confirm_put
      summary: 航路一括予約の仮押さえを確定する
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
          description: |
            親予約ID（冪等キー）。
            POST /uaslReservations のレスポンスで返却される requestId を指定する。
            同一requestIdで複数回呼び出しても同じ結果を返す。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmUaslReservationResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uaslReservations/{requestId}/cancel:
    put:
      tags:
        - ドローン航路一括予約サービス
      summary: 航路一括予約を取り消す
      operationId: uasl_reservations_cancel_put
      description: 航路・機体・離着陸場を含む予約を取り消す
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelUaslReservationResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/uaslReservations/{requestId}/rescind:
    put:
      tags:
        - ドローン航路一括予約サービス
      summary: 管理者が航路一括予約を撤回する
      operationId: uasl_reservations_rescind_put
      description: 航路 + 機体 + 離着陸場 予約情報撤回
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            minLength: 36
            maxLength: 36
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RescindUaslReservationResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error404Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      description: 航路予約サービスのAPI Gatewayにて生成されたキー
      type: apiKey
      name: API-Key
      in: header
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UaslSectionInput:
      type: object
      required:
        - uaslId
        - uaslSectionId
        - startAt
        - endAt
      description: 航路区画の予約入力情報
      properties:
        uaslId:
          type: string
          description: 航路ID
          example: "7c1d2e3f-4a5b-4c6d-8e7f-1a2b3c4d5e6f"
        uaslSectionId:
          type: string
          description: 航路区画ID
          example: "3f2504e0-4f89-41d3-9a0c-0305e82c3301"
        sequence:
          type: integer
          format: int32
          description: 航路区画の予約順序
          example: 1
        startAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:00:00Z"
        endAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:10:00Z"

    UaslSectionAvailabilityInput:
      type: object
      required:
        - uaslId
        - uaslSectionId
      description: 予約状況照会の航路区画入力情報
      properties:
        uaslId:
          type: string
          description: 航路ID
          example: "7c1d2e3f-4a5b-4c6d-8e7f-1a2b3c4d5e6f"
        uaslSectionId:
          type: string
          description: 航路区画ID
          example: "3f2504e0-4f89-41d3-9a0c-0305e82c3301"

    UaslSections:
      type: object
      required:
        - uaslSectionId
        - startAt
        - endAt
        - amount
      description: 航路区画の予約内容
      properties:
        uaslSectionId:
          type: string
          description: 航路区画ID
          example: "b819090d-679e-458c-ac96-903866cdb700"
        sequence:
          type: integer
          format: int32
          description: 航路区画の予約順序
          example: 1
        startAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンはZ（UTC）で指定してください。
          example: "2025-12-12T10:00:00Z"
        endAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンはZ（UTC）で指定してください。
          example: "2025-12-12T10:10:00Z"
        amount:
          type: integer
          format: int32
          description: 金額
          example: 500

    UaslSectionReservationItem:
      type: object
      required:
        - requestId
        - operatorId
        - flightPurpose
        - startAt
        - endAt
      description: 航路区画の既存予約情報
      properties:
        requestId:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: |
            親予約ID（冪等キー）
            本API呼び出しを一意に識別するためのIDで、confirm/detailなどの後続API呼び出し時に指定する。
        operatorId:
          type: string
          description: 運航事業者ID
          example: 60c895e5-321a-fe8a-af39-f005f3206efb
        flightPurpose:
          type: string
          description: 飛行目的
          example: "ドローン鉄橋点検"
        startAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:00:00Z"
        endAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:10:00Z"

    VehicleInput:
      type: object
      required:
        - aircraftInfo
        - startAt
        - endAt
      properties:
        vehicleId:
          type: string
          description: 機体ID
          example: "ROUTEOPRID-VEHICLEID-101"
        aircraftInfo:
          $ref: "#/components/schemas/AircraftInfo"
        startAt:
          type: string
          format: date-time
          description: >-
            指定がない場合は該当するuaslSectionsの範囲を採用（サーバ側で補完）
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:00:00Z"
        endAt:
          type: string
          format: date-time
          description: >-
            指定がない場合は該当するuaslSectionsの範囲を採用（サーバ側で補完）
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "2025-12-12T10:10:00Z"

    VehicleAvailabilityInput:
      type: object
      required:
        - vehicleId
      description: 予約状況照会の機体入力情報
      properties:
        vehicleId:
          type: string
          description: 機体ID
          example: "ROUTEOPRID-VEHICLEID-101"

    VehicleElement:
      type: object
      required:
        - vehicleId
        - reservationId
        - aircraftInfo
        - startAt
        - endAt
        - amount
      description: 機体予約要素
      properties:
        vehicleId:
          type: string
          description: 機体ID
          example: "ROUTEOPRID-VEHICLEID-101"
        reservationId:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: |
            親予約ID（requestId）に紐づく、機体の子予約ID。
          example: "b819090d-679e-458c-ac96-903866cdb700"
        aircraftInfo:
          $ref: "#/components/schemas/AircraftInfo"
        startAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "1985-04-12T23:20:50.52Z"
        endAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "1985-04-12T23:20:50.52Z"
        amount:
          type: integer
          format: int32
          description: 見積もり金額（税込）
          example: 300

    VehicleTryHoldElement:
      type: object
      required:
        - vehicleId
        - aircraftInfo
        - startAt
        - endAt
        - amount
      description: 機体予約要素
      properties:
        vehicleId:
          type: string
          description: 機体ID
          example: "ROUTEOPRID-VEHICLEID-101"
        aircraftInfo:
          $ref: "#/components/schemas/AircraftInfo"
        startAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "1985-04-12T23:20:50.52Z"
        endAt:
          type: string
          format: date-time
          description: >-
            RFC3339形式の日時文字列。タイムゾーンは Z（UTC）で指定してください。
          example: "1985-04-12T23:20:50.52Z"
        amount:
          type: integer
          format: int32
          description: 見積もり金額（税込）
          example: 300

    VehicleListElement:
      type: object
      required:
        - vehicleId
      description: 一覧取得用機体要素
      properties:
        vehicleId:
          type: string
          description: 機体ID
        reservationId:
          type: string
          format: uuid
          minLength: 36
          maxLength: 36
          description: 親予約ID（requestId）に紐づく、機体の子予約ID。
        name:
          type: string
          description: 機体の表示名またはモデル名
          example: "DJI-M30"
        amount:
          type: integer
          format: int32
          description: 見積もり金額（税込）
          example: 300

