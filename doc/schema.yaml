            "railway": 鉄道運行によるNG
            "intrusion": 第三者立入によるNG
            ※evaluationResultsがfalseの場合に参照
          enum: [
            "weather",
            "event",
            "railway",
            "intrusion",
            "null"
          ]
          example: weather
