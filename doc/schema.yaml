    CreateUaslReservationsRequest:
      type: object
      required:
        - operatorId
        - uaslSections
      description: 仮押さえ予約APIのリクエストボディ
      properties:
        operatorId:
          type: string
          description: 運航事業者ID
          example: 60c895e5-321a-fe8a-af39-f005f3206efb
        ignoreFlightPlanConflict:
          type: boolean
          description: |
            true の場合、DIPS 飛行計画との空域干渉を無視して予約を実行する。
            false（デフォルト）の場合、空域干渉が検出されると予約は実行されず、エラーメッセージのみを返す。
          default: false
        uaslSections:
          type: array
          minItems: 1
          maxItems: 99
          description: 予約しようとしている航路区画の一覧（1件以上必須）
          items:
            $ref: "#/components/schemas/UaslSectionInput"
        vehicles:
          type: array
          minItems: 1
          maxItems: 99
          description: |
            予約しようとしている機体の一覧
            機体の予約入力情報。シェアリング機体予約の場合はvehicleId必須。
            持ち込み機体の場合はaircraftInfoで代替するためvehicleId不要。
          items:
            $ref: "#/components/schemas/VehicleInput"
        ports:
          type: array
          minItems: 1
          maxItems: 99
          description: 予約しようとしている離着陸場の一覧
          items:
            $ref: "#/components/schemas/PortInput"
