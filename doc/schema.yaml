    UaslReservationAvailabilityItem:
      type: object
      description: |
        当該航路区画・機体・離着陸場に対して「すでに予約されている」既存の予約情報の1件を示す。
        キャンセル済みや撤回済みの予約情報は含まれない。
      properties:
        uaslSections:
          type: array
          description: 航路区画情報
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/UaslSectionReservationItem"
        ports:
          type: array
          description: 離着陸場情報
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/PortReservationItem"
        vehicles:
          type: array
          description: 機体情報
          minItems: 1
          maxItems: 99
          items:
            $ref: "#/components/schemas/VehicleReservationItem"

    UaslReservationAvailabilityResponse:
      type: object
      required:
        - result
      properties:
        result:
          nullable: false
          $ref: "#/components/schemas/UaslReservationAvailabilityItem"

    ConflictedResponse:
      type: object
      required:
        - message
        - conflicts
      description: 競合エラーレスポンス
      properties:
        requestId:
          type: string
          example: uuid
        errorCode:
          type: string
          example: AIRSPACE_CONFLICT
        message:
          type: string
          example: Reservation not executed due to airspace conflict
        conflicts:
          type: object
          properties:
            type:
              type: string
              example: FLIGHTPLAN
            items:
              type: array
              description: 空域干渉が検出されたIDの一覧（空配列の場合は干渉なし）
              minItems: 0
              maxItems: 999
              items:
                type: object
                additionalProperties:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
              example:
                - requestId: res-123
                - uaslId: uasl-123
                - administratorId: admin-123
                - reservationId: res-456
                - resourceId: port-001
                - flightPlanIds:
                    - 2d3a6a8e-8b8d-4d5a-a8a8-9bdc4e9a0c1f
                    - 3e4b7b9f-9c9e-5e6b-b9b9-0cde5f0ad2f0
    ForbiddenResponse:
      type: object
      required:
        - message
      description: アクセス禁止エラーレスポンス
      properties:
        message:
          type: string
          example: Forbidden
    ErrorResponse:
      type: object
      required:
        - message
      description: エラーレスポンス
      properties:
        message:
          type: string
          description: エラーメッセージ
          example: "Bad Request"
    Error404Response:
      type: object
      required:
        - error
      description: 404エラーレスポンス
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: "NOT_FOUND"