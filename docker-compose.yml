version: "3.8"

services:
  uasl_reservation:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./containers/uasl_reservation/Dockerfile
    ports:
      - 8080:8080
    env_file:
      - .env
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - uasl_reservation
    image: uasl_reservation-app
  postgres:
    image: postgis/postgis:15-3.4
    platform: linux/amd64
    hostname: postgres
    container_name: aw-postgres
    ports:
      - 5432:5432
    networks:
      - uasl_reservation
    env_file:
      - .env
    restart: always

  monthly_settlement:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./containers/monthly_settlement/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      uasl_reservation:
        condition: service_healthy
    networks:
      - uasl_reservation
    image: monthly_settlement-app
    restart: "no"

networks:
  uasl_reservation:
